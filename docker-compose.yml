services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: firecrust
      POSTGRES_USER: firecrust
      POSTGRES_PASSWORD: firecrust
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/seed_menu_items.sql:/docker-entrypoint-initdb.d/01_seed_menu_items.sql:ro

  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://firecrust:firecrust@db:5432/firecrust
      JWT_SECRET_KEY: change-me
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
